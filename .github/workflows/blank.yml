name: Build Keycloak Config CLI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. 6.4.1)'
        required: true
        default: '6.4.1'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REPOSITORY_URL: https://github.com/adorsys/keycloak-config-cli.git
      REPO_NAME: keycloak-config-cli
      TAG_NAME: ${{ github.event.inputs.tag_name }}

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Clone repository
        run: git clone "$REPOSITORY_URL"

      - name: Checkout tag
        run: |
          cd "$REPO_NAME"
          git checkout "tags/v$TAG_NAME"

      - name: Build JAR
        run: |
          cd "$REPO_NAME"
          mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-config-cli-${{ env.TAG_NAME }}
          path: ${{ env.REPO_NAME }}/target/*.jar
