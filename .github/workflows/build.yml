name: Build Keycloak Config CLI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. 6.4.1)'
        required: true
        default: '6.5.1'

env:
  REPOSITORY_URL: https://github.com/adorsys/keycloak-config-cli.git
  REPO_NAME: keycloak-config-cli
  TAG_NAME: ${{ github.event.inputs.tag_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest



    steps:
      - name: Clone repository
        run: git clone "$REPOSITORY_URL"

      - name: Checkout tag
        run: |
          cd "$REPO_NAME"
          git checkout "tags/v$TAG_NAME"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: |
          cd "$REPO_NAME"
          mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-config-cli-${{ env.TAG_NAME }}
          path: |
            ${{ env.REPO_NAME }}/target/*.jar
            ${{ env.REPO_NAME }}/pom.xml
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build 

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: keycloak-config-cli-${{ env.TAG_NAME }}

      - name: Summary
        run: |
          echo "## Build completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact downloaded from previous job." >> $GITHUB_STEP_SUMMARY
