name: Build Keycloak Config CLI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. 6.4.1)'
        required: true
        default: '6.5.1'

env:
  REPOSITORY_URL: https://github.com/adorsys/keycloak-config-cli.git
  REPO_NAME: keycloak-config-cli
  TAG_NAME: ${{ github.event.inputs.tag_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: git clone "$REPOSITORY_URL"

      - name: Checkout tag
        run: |
          cd "$REPO_NAME"
          git checkout "tags/v$TAG_NAME"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: |
          cd "$REPO_NAME"
          mvn clean package -DskipTests

      - name: Stage artifacts
        run: |
          cd "$REPO_NAME"
          mkdir -p staging
          # spring-boot repackage zostawia jeden *.jar w target (*.jar.original nie łapie się w glob)
          cp target/*.jar "staging/keycloak-config-cli-${TAG_NAME}.jar"
          cp pom.xml      "staging/keycloak-config-cli-${TAG_NAME}.pom"
          ls -la staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-config-cli-${{ github.event.inputs.tag_name }}
          path: ${{ env.REPO_NAME }}/staging/
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: keycloak-config-cli-${{ github.event.inputs.tag_name }}

      - name: Summary
        run: |
          echo "## Build completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact downloaded from previous job." >> $GITHUB_STEP_SUMMARY
          ls -la
